<!DOCTYPE html>
<html>
<head>
    <title>Editar Equipo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

<h2>Editar equipo</h2>

<form method="post" class="row g-3">

    <div class="col-md-2">
        <label>Código</label>
        <input class="form-control" name="codigo" value="{{ equipo.codigo }}" readonly>
    </div>

    <div class="col-md-3">
        <label>Nombre</label>
        <input class="form-control" name="nombre" value="{{ equipo.nombre }}">
    </div>

    <div class="col-md-2">
        <label>Marca</label>
        <input class="form-control" name="marca" value="{{ equipo.marca }}">
    </div>

    <div class="col-md-2">
        <label>Modelo</label>
        <input class="form-control" name="modelo" value="{{ equipo.modelo }}">
    </div>

    <div class="col-md-2">
        <label>Serie</label>
        <input class="form-control" name="serie" value="{{ equipo.serie }}">
    </div>

    <div class="col-md-3">
        <label>Ubicación</label>
        <input class="form-control" name="ubicacion" value="{{ equipo.ubicacion }}">
    </div>

    <div class="col-md-2">
        <label>Clase</label>
        <input class="form-control" name="clase" value="{{ equipo.clase }}">
    </div>

    <div class="col-md-3">
        <label>INVIMA</label>
        <input class="form-control" name="invima" value="{{ equipo.invima }}">
    </div>

    <div class="col-md-2">
        <label>Fecha compra</label>
        <input type="date" class="form-control" name="fecha_compra" value="{{ equipo.fecha_compra }}">
    </div>

    <div class="col-md-3">
        <label>Proveedor</label>
        <input class="form-control" name="proveedor" value="{{ equipo.proveedor }}">
    </div>

    <div class="col-md-2">
        <label>Fecha instalación</label>
        <input type="date" class="form-control" name="fecha_instalacion" value="{{ equipo.fecha_instalacion }}">
    </div>

    <div class="col-md-2">
        <label>Frecuencia mantenimiento</label>
        <input class="form-control" name="frecuencia_mantenimiento" value="{{ equipo.frecuencia_mantenimiento }}">
    </div>

    <div class="col-md-2">
        <label>Último mantenimiento</label>
        <input type="date" class="form-control" name="ultimo_mantenimiento" value="{{ equipo.ultimo_mantenimiento }}">
    </div>

    <div class="col-md-2">
        <label>Próximo mantenimiento</label>
        <input type="date" class="form-control" name="proximo_mantenimiento" value="{{ equipo.proximo_mantenimiento }}">
    </div>

    <div class="col-md-2">
        <label>¿Aplica metrología?</label>
        <input class="form-control" name="metrologia" value="{{ equipo.metrologia }}">
    </div>

    <div class="col-md-2">
        <label>Última Calibración</label>
        <input type="date" class="form-control" name="ultima_calibracion" value="{{ equipo.ultima_calibracion }}">
    </div>
    
    <div class="col-md-2">
        <label>Frecuencia metrología</label>
        <input class="form-control" name="frecuencia_metrologia" value="{{ equipo.frecuencia_metrologia }}">
    </div>

    <div class="col-md-4">
        <label>Observaciones</label>
        <input class="form-control" name="observaciones" value="{{ equipo.observaciones }}">
    </div>

    <div class="col-12">
        <button class="btn btn-success">Guardar cambios</button>
        <a href="/" class="btn btn-secondary">Volver</a>
    </div>

</form>

</body>
</html>
