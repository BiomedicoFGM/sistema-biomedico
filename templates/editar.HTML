<!DOCTYPE html>
<html>
<head>
    <title>Editar Equipo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

<h2>Editar Equipo</h2>

<form method="post" class="row g-3">

    <div class="col-md-6">
        <label>Código</label>
        <input class="form-control" value="{{ equipo.codigo }}" disabled>
    </div>

    <div class="col-md-6">
        <label>Nombre</label>
        <input class="form-control" name="nombre" value="{{ equipo.nombre }}">
    </div>

    <div class="col-md-6">
        <label>Serial</label>
        <input class="form-control" name="serial" value="{{ equipo.serial }}">
    </div>

    <div class="col-md-6">
        <label>Ubicación</label>
        <input class="form-control" name="ubicacion" value="{{ equipo.ubicacion }}">
    </div>

    <div class="col-md-6">
        <label>Marca</label>
        <input class="form-control" name="marca" value="{{ equipo.marca }}">
    </div>

    <div class="col-md-6">
        <label>Estado</label>
        <input class="form-control" name="estado" value="{{ equipo.estado }}">
    </div>

    <div class="col-md-6">
        <label>Mantenimiento</label>
        <input class="form-control" name="mantenimiento" value="{{ equipo.mantenimiento }}">
    </div>

    <div class="col-12">
        <button class="btn btn-success">Guardar cambios</button>
        <a href="/" class="btn btn-secondary">Volver</a>
    </div>

</form>

</body>
</html>
