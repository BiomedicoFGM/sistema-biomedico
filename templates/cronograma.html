<!DOCTYPE html>
<html>
<head>
    <title>Cronograma</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

<h2>📅 Cronograma de mantenimiento y calibración</h2>

<a href="/" class="btn btn-secondary mb-3">⬅ Volver</a>

<!-- 🔎 FILTROS -->
<form method="get" class="row g-3 mb-4">

    <div class="col-md-3">
        <input type="month" name="mes" class="form-control">
    </div>

    <div class="col-md-3">
        <input name="ubicacion" class="form-control" placeholder="Filtrar por ubicación">
    </div>

    <div class="col-md-2">
        <button class="btn btn-primary">Filtrar</button>
    </div>

</form>

<!-- 📊 TABLA -->
<table class="table table-bordered table-striped">

    <thead class="table-dark">
        <tr>
            <th>Código</th>
            <th>Equipo</th>
            <th>Tipo</th>
            <th>Fecha</th>
            <th>Ubicación</th>
        </tr>
    </thead>

    <tbody>
        {% for e in eventos %}
        <tr>
            <td>{{ e.codigo }}</td>
            <td>{{ e.nombre }}</td>
            <td>
                {% if e.tipo == "Mantenimiento" %}
                    🔧 {{ e.tipo }}
                {% else %}
                    📏 {{ e.tipo }}
                {% endif %}
            </td>
            <td>{{ e.fecha }}</td>
            <td>{{ e.ubicacion }}</td>
        </tr>
        {% endfor %}
    </tbody>

</table>

</body>
</html>
